site_name: AI/ML Learning Notes
site_url: https://jjietay.github.io/AI_ML_Learning/

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - content.code.copy
    - navigation.top
    - navigation.sections

nav:
  - Home: index.md
  - Theory:
    - Foundations:
      - Neuron: theory/1_neuron.md
      - Multilayer Perceptrons: theory/7_multilayer_perceptrons.md
      - "ReLU & Gated": theory/8_relu_gated.md
      - Vanishing Gradients: theory/vanishing_grad.md
      - "Dropout & Coadaptation": theory/4_dropout_coadaptation.md
      - Ensemble: theory/ensemble.md
    - Convolutional Networks:
      - CNN: theory/2_cnn.md
      - VGG: theory/vgg.md
      - ResNet: theory/resnet.md
      - SE Block: theory/3_se_block.md
    - Sequence Models:
      - RNN: theory/5_rnn.md
      - LSTM: theory/lstm.md
      - GRU: theory/gru.md
    - Generative Models:
      - GAN: theory/gan.md
      - U-Net: theory/unet.md
      - Ada_LN-Zero: theory/adaln_zero.md
      - DiT: theory/dit.md
    - "Attention & Transformers":
      - "Transformers & Attention": theory/6_transformers_attention.md
      - BERT: theory/bert.md
    - Vision Transformers:
      - ViT: theory/vit.md
      - Swin Transformer: theory/swin_transformer.md

plugins:
  - search

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - admonition
  - tables
  - def_list
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
